name: Daily Data Workflow

on:
  schedule:
    - cron: "58 22 * * *"   # 23:58 Belgische tijd = 22:58 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          sudo apt-get install -y pandoc
          sudo apt-get install -y texlive texlive-latex-extra texlive-fonts-recommended

      - name: Install Python dependencies
        run: |
          pip install pandas matplotlib numpy

      - name: Run data transform script
        run: |
          bash data-workflow/scripts/transform.sh
        continue-on-error: false

      - name: Run analysis script
        run: |
          python3 data-workflow/scripts/analyze.py

      - name: Generate report
        run: |
          bash data-workflow/scripts/generate_report.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: data-workflow/report/

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
